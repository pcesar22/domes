name: Hardware Tests

on:
  # Trigger when 'hw-test' label is added to a PR
  pull_request:
    types: [labeled]

  # Also run on push to main (post-merge verification)
  push:
    branches: [main]
    paths:
      - 'firmware/**'
      - 'tools/domes-cli/**'

  # Keep manual trigger as backup
  workflow_dispatch:
    inputs:
      ports:
        description: 'Comma-separated serial ports (e.g., /dev/ttyACM0,/dev/ttyACM1)'
        required: false
        default: '/dev/ttyACM0'
      device_count:
        description: 'Number of devices to test (1 or 2)'
        required: false
        default: '1'
        type: choice
        options:
          - '1'
          - '2'

# Only one hardware test can run at a time on the self-hosted runner.
# New runs cancel queued/stale runs to prevent infinite queue buildup.
concurrency:
  group: hardware-test-queue
  cancel-in-progress: true

env:
  # Comma-separated list of serial ports
  SERIAL_PORTS: ${{ github.event.inputs.ports || '/dev/ttyACM0' }}
  DEVICE_COUNT: ${{ github.event.inputs.device_count || '1' }}

jobs:
  hardware-test:
    name: On-Device Tests
    runs-on: self-hosted

    # Only run if:
    # - Label trigger AND label is 'hw-test', OR
    # - Push to main, OR
    # - Manual dispatch
    if: |
      (github.event_name == 'pull_request' && github.event.label.name == 'hw-test') ||
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Detect devices
        id: detect
        run: |
          echo "=== Detecting connected DOMES devices ==="

          # Parse comma-separated ports into array
          IFS=',' read -ra PORTS <<< "$SERIAL_PORTS"

          # Auto-detect if only default port specified
          if [ "${#PORTS[@]}" -eq 1 ] && [ "${PORTS[0]}" = "/dev/ttyACM0" ]; then
            DETECTED=()
            for port in /dev/ttyACM*; do
              if [ -e "$port" ]; then
                DETECTED+=("$port")
              fi
            done
            if [ ${#DETECTED[@]} -gt 0 ]; then
              PORTS=("${DETECTED[@]}")
            fi
          fi

          echo "Detected ${#PORTS[@]} device(s):"
          for port in "${PORTS[@]}"; do
            if [ -e "$port" ]; then
              echo "  OK: $port"
            else
              echo "  MISSING: $port"
            fi
          done

          # Export for subsequent steps
          PORT_LIST=$(IFS=','; echo "${PORTS[*]}")
          echo "ports=$PORT_LIST" >> $GITHUB_OUTPUT
          echo "count=${#PORTS[@]}" >> $GITHUB_OUTPUT
          echo "primary=${PORTS[0]}" >> $GITHUB_OUTPUT

          if [ ${#PORTS[@]} -ge 2 ]; then
            echo "secondary=${PORTS[1]}" >> $GITHUB_OUTPUT
            echo "multi=true" >> $GITHUB_OUTPUT
          else
            echo "secondary=" >> $GITHUB_OUTPUT
            echo "multi=false" >> $GITHUB_OUTPUT
          fi

          # Fail if no devices found
          if [ ! -e "${PORTS[0]}" ]; then
            echo "::error::No devices found. Available serial ports:"
            ls -la /dev/ttyACM* /dev/ttyUSB* 2>/dev/null || echo "None"
            exit 1
          fi

      - name: Build firmware
        working-directory: firmware/domes
        run: |
          . ~/esp/esp-idf/export.sh
          idf.py build
          echo "Firmware built successfully"
          echo "Binary size: $(stat -c%s build/domes.bin) bytes"

      - name: Build domes-cli
        working-directory: tools/domes-cli
        run: |
          cargo build --release
          echo "CLI built successfully"

      - name: Flash all devices
        working-directory: firmware/domes
        run: |
          . ~/esp/esp-idf/export.sh

          IFS=',' read -ra PORTS <<< "${{ steps.detect.outputs.ports }}"
          FAILED=0

          for port in "${PORTS[@]}"; do
            echo "=== Flashing $port ==="
            if idf.py -p "$port" flash; then
              echo "Flashed $port successfully"
            else
              echo "::error::Failed to flash $port"
              FAILED=$((FAILED + 1))
            fi
          done

          echo "Waiting for devices to boot..."
          sleep 15

          if [ $FAILED -gt 0 ]; then
            echo "::error::$FAILED device(s) failed to flash"
            exit 1
          fi

      - name: Test - Feature List (all devices)
        run: |
          IFS=',' read -ra PORTS <<< "${{ steps.detect.outputs.ports }}"
          CLI=tools/domes-cli/target/release/domes-cli

          for port in "${PORTS[@]}"; do
            echo "=== Feature list: $port ==="
            # Retry up to 3 times with 5s delay — USB-CDC can take extra time
            for attempt in 1 2 3; do
              if $CLI --port "$port" feature list; then
                break
              fi
              if [ $attempt -lt 3 ]; then
                echo "Attempt $attempt failed, retrying in 5s..."
                sleep 5
              else
                echo "::error::Feature list failed on $port after 3 attempts"
                exit 1
              fi
            done
            echo ""
          done
          echo "Feature list test passed on all devices"

      - name: Test - Serial OTA (primary device)
        continue-on-error: true
        run: |
          PRIMARY="${{ steps.detect.outputs.primary }}"
          echo "Testing Serial OTA on $PRIMARY..."

          tools/domes-cli/target/release/domes-cli \
            --port "$PRIMARY" \
            ota flash firmware/domes/build/domes.bin \
            --version "v0.0.0-ci-${{ github.sha }}"

          echo "OTA complete, waiting for reboot..."
          sleep 15

      - name: Test - Post-OTA Verification (primary device)
        continue-on-error: true
        run: |
          PRIMARY="${{ steps.detect.outputs.primary }}"
          echo "Verifying $PRIMARY responds after OTA..."
          tools/domes-cli/target/release/domes-cli --port "$PRIMARY" feature list
          echo "Post-OTA verification passed"

      - name: Test - Multi-Device Feature List
        if: steps.detect.outputs.multi == 'true'
        run: |
          echo "Testing multi-device feature list..."
          CLI=tools/domes-cli/target/release/domes-cli

          # Test with multiple --port flags
          $CLI \
            --port "${{ steps.detect.outputs.primary }}" \
            --port "${{ steps.detect.outputs.secondary }}" \
            feature list

          echo "Multi-device feature list passed"

      - name: Test - ESP-NOW Communication
        id: espnow
        if: steps.detect.outputs.multi == 'true'
        continue-on-error: true
        run: |
          echo "Testing ESP-NOW between devices..."
          CLI=tools/domes-cli/target/release/domes-cli
          PRIMARY="${{ steps.detect.outputs.primary }}"
          SECONDARY="${{ steps.detect.outputs.secondary }}"

          # Enable ESP-NOW on both devices
          echo "=== Enabling ESP-NOW on both devices ==="
          $CLI --port "$PRIMARY" feature enable esp-now || { echo "::warning::ESP-NOW not available on primary"; exit 0; }
          $CLI --port "$SECONDARY" feature enable esp-now || { echo "::warning::ESP-NOW not available on secondary"; exit 0; }

          # Wait for peer discovery
          echo "Waiting 10s for ESP-NOW peer discovery..."
          sleep 10

          # Check ESP-NOW status on both devices
          echo "=== ESP-NOW status: primary ==="
          $CLI --port "$PRIMARY" espnow status || true
          echo ""
          echo "=== ESP-NOW status: secondary ==="
          $CLI --port "$SECONDARY" espnow status || true
          echo ""

          # Run latency benchmark (short: 20 rounds for CI)
          echo "=== ESP-NOW latency benchmark (20 rounds) ==="
          BENCH_OUTPUT=$($CLI --port "$PRIMARY" espnow bench --rounds 20 2>&1) || true
          echo "$BENCH_OUTPUT"

          # Parse benchmark result for summary
          if echo "$BENCH_OUTPUT" | grep -q "avg"; then
            echo "espnow_bench_passed=true" >> $GITHUB_OUTPUT
            echo "$BENCH_OUTPUT" > /tmp/espnow-bench.txt
          else
            echo "espnow_bench_passed=false" >> $GITHUB_OUTPUT
            echo "Benchmark did not produce results (ESP-NOW may not have peers)"
          fi

          echo "ESP-NOW test complete"

      - name: Test - WiFi Status (if enabled)
        continue-on-error: true
        run: |
          IFS=',' read -ra PORTS <<< "${{ steps.detect.outputs.ports }}"
          CLI=tools/domes-cli/target/release/domes-cli

          for port in "${PORTS[@]}"; do
            echo "Checking WiFi status on $port..."
            $CLI --port "$port" wifi status || true
          done

      - name: Test - System Health (all devices)
        continue-on-error: true
        run: |
          IFS=',' read -ra PORTS <<< "${{ steps.detect.outputs.ports }}"
          CLI=tools/domes-cli/target/release/domes-cli

          for port in "${PORTS[@]}"; do
            echo "=== System health: $port ==="
            $CLI --port "$port" system health || true
            echo ""
          done

      - name: Collect traces (all devices)
        id: traces
        if: always()
        continue-on-error: true
        run: |
          CLI=tools/domes-cli/target/release/domes-cli
          IFS=',' read -ra PORTS <<< "${{ steps.detect.outputs.ports }}"
          TRACE_DIR=/tmp/hw-test-traces
          mkdir -p "$TRACE_DIR"

          TRACE_FILES=()
          POD_ARGS=()

          for i in "${!PORTS[@]}"; do
            port="${PORTS[$i]}"
            outfile="$TRACE_DIR/trace-pod${i}.json"
            echo "=== Dumping traces from $port ==="
            if $CLI --port "$port" trace dump --output "$outfile" --names tools/trace/trace_names.json 2>&1; then
              echo "Trace saved: $outfile"
              TRACE_FILES+=("$outfile")
              POD_ARGS+=("--pod" "$outfile" "--pod-name" "Pod $i ($port)")
            else
              echo "No traces available from $port (buffer empty or not initialized)"
            fi
          done

          # Merge traces if we have multiple pod dumps
          if [ ${#TRACE_FILES[@]} -ge 2 ]; then
            echo "=== Merging ${#TRACE_FILES[@]} pod traces ==="
            python3 tools/trace/trace_merge.py \
              "${POD_ARGS[@]}" \
              --names tools/trace/trace_names.json \
              --align beacon \
              -o "$TRACE_DIR/merged-trace.json" || \
            python3 tools/trace/trace_merge.py \
              "${POD_ARGS[@]}" \
              --names tools/trace/trace_names.json \
              --align zero \
              -o "$TRACE_DIR/merged-trace.json" || true
            echo "Merged trace: $TRACE_DIR/merged-trace.json"
          fi

          # Set output for artifact upload
          echo "trace_dir=$TRACE_DIR" >> $GITHUB_OUTPUT
          if [ ${#TRACE_FILES[@]} -gt 0 ]; then
            echo "has_traces=true" >> $GITHUB_OUTPUT
          else
            echo "has_traces=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload trace artifacts
        continue-on-error: true
        if: steps.traces.outputs.has_traces == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: hw-test-traces-${{ github.sha }}
          path: ${{ steps.traces.outputs.trace_dir }}/*.json
          retention-days: 14

      - name: Summary
        if: always()
        run: |
          echo "## Hardware Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Devices | ${{ steps.detect.outputs.count }} (${{ steps.detect.outputs.ports }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Multi-device | ${{ steps.detect.outputs.multi }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.head_ref || github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Results" >> $GITHUB_STEP_SUMMARY
          echo "- [x] Firmware build" >> $GITHUB_STEP_SUMMARY
          echo "- [x] CLI build" >> $GITHUB_STEP_SUMMARY
          echo "- [x] Flash all devices" >> $GITHUB_STEP_SUMMARY
          echo "- [x] Feature list (all devices)" >> $GITHUB_STEP_SUMMARY
          echo "- [x] Serial OTA (primary)" >> $GITHUB_STEP_SUMMARY
          echo "- [x] Post-OTA verification" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.detect.outputs.multi }}" = "true" ]; then
            echo "- [x] Multi-device feature list" >> $GITHUB_STEP_SUMMARY
            if [ "${{ steps.espnow.outcome }}" = "success" ]; then
              echo "- [x] ESP-NOW communication" >> $GITHUB_STEP_SUMMARY
            else
              echo "- [ ] ESP-NOW communication (skipped or failed)" >> $GITHUB_STEP_SUMMARY
            fi
          fi
          echo "- [x] System health check" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.traces.outputs.has_traces }}" = "true" ]; then
            echo "- [x] Trace collection (artifacts uploaded)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- [ ] Trace collection (no traces available)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Trace Artifacts" >> $GITHUB_STEP_SUMMARY
          if ls trace-artifacts/*.json 1>/dev/null 2>&1; then
            for f in trace-artifacts/*.json; do
              SIZE=$(stat -c%s "$f" 2>/dev/null || echo "0")
              echo "- \`$(basename $f)\` (${SIZE} bytes)" >> $GITHUB_STEP_SUMMARY
            done
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Download trace files from the **Artifacts** section and open at [ui.perfetto.dev](https://ui.perfetto.dev)" >> $GITHUB_STEP_SUMMARY
          else
            echo "No traces collected (buffer empty or tracing not initialized)" >> $GITHUB_STEP_SUMMARY
          fi
