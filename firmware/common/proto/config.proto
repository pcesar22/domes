// Runtime configuration protocol for DOMES firmware
// Shared between firmware (nanopb) and host CLI (prost)
//
// THIS IS THE SINGLE SOURCE OF TRUTH FOR ALL CONFIG PROTOCOL DEFINITIONS.
// DO NOT duplicate these definitions in firmware or CLI code.
syntax = "proto3";
package domes.config;

// Frame-level message types for config protocol
// Used in the frame header [0xAA 0x55][Len][MsgType][Payload][CRC32]
enum MsgType {
    MSG_TYPE_UNKNOWN = 0;

    // Config commands (0x20-0x2F range)
    MSG_TYPE_LIST_FEATURES_REQ = 0x20;
    MSG_TYPE_LIST_FEATURES_RSP = 0x21;
    MSG_TYPE_SET_FEATURE_REQ = 0x22;
    MSG_TYPE_SET_FEATURE_RSP = 0x23;
    MSG_TYPE_GET_FEATURE_REQ = 0x24;
    MSG_TYPE_GET_FEATURE_RSP = 0x25;
    MSG_TYPE_SET_LED_PATTERN_REQ = 0x26;
    MSG_TYPE_SET_LED_PATTERN_RSP = 0x27;
    MSG_TYPE_GET_LED_PATTERN_REQ = 0x28;
    MSG_TYPE_GET_LED_PATTERN_RSP = 0x29;
    MSG_TYPE_SET_IMU_TRIAGE_REQ = 0x2A;
    MSG_TYPE_SET_IMU_TRIAGE_RSP = 0x2B;

    // System mode commands (0x30-0x37 range)
    MSG_TYPE_GET_MODE_REQ = 0x30;
    MSG_TYPE_GET_MODE_RSP = 0x31;
    MSG_TYPE_SET_MODE_REQ = 0x32;
    MSG_TYPE_SET_MODE_RSP = 0x33;
    MSG_TYPE_GET_SYSTEM_INFO_REQ = 0x34;
    MSG_TYPE_GET_SYSTEM_INFO_RSP = 0x35;
    MSG_TYPE_SET_POD_ID_REQ = 0x36;
    MSG_TYPE_SET_POD_ID_RSP = 0x37;

    // Observability commands (0x38-0x4F range)
    MSG_TYPE_GET_HEALTH_REQ = 0x38;
    MSG_TYPE_GET_HEALTH_RSP = 0x39;
    MSG_TYPE_GET_ESPNOW_STATUS_REQ = 0x3A;
    MSG_TYPE_GET_ESPNOW_STATUS_RSP = 0x3B;
    MSG_TYPE_ESPNOW_BENCH_REQ = 0x3C;
    MSG_TYPE_ESPNOW_BENCH_RSP = 0x3D;

    // Crash dump commands (0x3E-0x41)
    MSG_TYPE_GET_CRASH_DUMP_REQ = 0x3E;
    MSG_TYPE_GET_CRASH_DUMP_RSP = 0x3F;
    MSG_TYPE_CLEAR_CRASH_DUMP_REQ = 0x40;
    MSG_TYPE_CLEAR_CRASH_DUMP_RSP = 0x41;

    // Memory profiler commands (0x42-0x43)
    MSG_TYPE_GET_MEMORY_PROFILE_REQ = 0x42;
    MSG_TYPE_GET_MEMORY_PROFILE_RSP = 0x43;

    // Self-test / smoke test commands (0x44-0x45)
    MSG_TYPE_SELF_TEST_REQ = 0x44;
    MSG_TYPE_SELF_TEST_RSP = 0x45;

    // GitHub OTA commands (0x46-0x49)
    MSG_TYPE_CHECK_UPDATE_REQ = 0x46;
    MSG_TYPE_CHECK_UPDATE_RSP = 0x47;
    MSG_TYPE_SET_AUTO_UPDATE_REQ = 0x48;
    MSG_TYPE_SET_AUTO_UPDATE_RSP = 0x49;

    // Touch injection commands (0x4C-0x4D)
    MSG_TYPE_SIMULATE_TOUCH_REQ = 0x4C;
    MSG_TYPE_SIMULATE_TOUCH_RSP = 0x4D;

    // Sim drill mode commands (0x4E-0x4F)
    MSG_TYPE_SET_SIM_MODE_REQ = 0x4E;
    MSG_TYPE_SET_SIM_MODE_RSP = 0x4F;
}

// Status codes for responses
enum Status {
    STATUS_OK = 0;
    STATUS_ERROR = 1;
    STATUS_INVALID_FEATURE = 2;
    STATUS_BUSY = 3;
    STATUS_INVALID_PATTERN = 4;
    STATUS_NO_DATA = 5;
}

// LED pattern types
enum LedPatternType {
    LED_PATTERN_OFF = 0;
    LED_PATTERN_SOLID = 1;
    LED_PATTERN_BREATHING = 2;
    LED_PATTERN_COLOR_CYCLE = 3;
}

// RGBW color (0-255 per channel)
message Color {
    uint32 r = 1;
    uint32 g = 2;
    uint32 b = 3;
    uint32 w = 4;  // White channel (ignored for RGB-only LEDs)
}

// Runtime-toggleable features
enum Feature {
    FEATURE_UNKNOWN = 0;
    FEATURE_LED_EFFECTS = 1;
    FEATURE_BLE_ADVERTISING = 2;
    FEATURE_WIFI = 3;
    FEATURE_ESP_NOW = 4;
    FEATURE_TOUCH = 5;
    FEATURE_HAPTIC = 6;
    FEATURE_AUDIO = 7;
}

// Feature with its current state
message FeatureState {
    Feature feature = 1;
    bool enabled = 2;
}

// Request messages
message ListFeaturesRequest {
    // Empty - lists all features
}

message SetFeatureRequest {
    Feature feature = 1;
    bool enabled = 2;
}

// LED pattern with parameters
message LedPattern {
    LedPatternType type = 1;
    Color color = 2;              // Primary color (for solid/breathing)
    repeated Color colors = 3;    // Color list (for color_cycle)
    uint32 period_ms = 4;         // Animation period in ms
    uint32 brightness = 5;        // Global brightness (0-255)
}

message SetLedPatternRequest {
    LedPattern pattern = 1;
}

message GetLedPatternRequest {
    // Empty - returns current pattern
}

// Response messages
message ListFeaturesResponse {
    repeated FeatureState features = 1;
    uint32 pod_id = 2;  // Pod identity (0 = not set)
}

message SetFeatureResponse {
    FeatureState feature = 1;
}

message SetLedPatternResponse {
    LedPattern pattern = 1;
}

message GetLedPatternResponse {
    LedPattern pattern = 1;
}

// IMU triage mode messages
message SetImuTriageRequest {
    bool enabled = 1;
}

message SetImuTriageResponse {
    bool enabled = 1;
}

// System operating modes
enum SystemMode {
    SYSTEM_MODE_BOOTING = 0;
    SYSTEM_MODE_IDLE = 1;
    SYSTEM_MODE_TRIAGE = 2;
    SYSTEM_MODE_CONNECTED = 3;
    SYSTEM_MODE_GAME = 4;
    SYSTEM_MODE_ERROR = 5;
}

// System mode messages
message GetModeRequest {
    // Empty - returns current mode
}

message GetModeResponse {
    SystemMode mode = 1;
    uint32 time_in_mode_ms = 2;
}

message SetModeRequest {
    SystemMode mode = 1;
}

message SetModeResponse {
    SystemMode mode = 1;
    bool transition_ok = 2;
}

message GetSystemInfoRequest {
    // Empty - returns system info
}

message GetSystemInfoResponse {
    string firmware_version = 1;
    uint32 uptime_s = 2;
    uint32 free_heap = 3;
    uint32 boot_count = 4;
    SystemMode mode = 5;
    uint32 feature_mask = 6;
    uint32 pod_id = 7;  // Pod identity (0 = not set)
}

// Set pod ID (persisted to NVS)
message SetPodIdRequest {
    uint32 pod_id = 1;  // 1-255
}

message SetPodIdResponse {
    uint32 pod_id = 1;  // New pod ID after write
}

// ============================================================================
// Observability messages
// ============================================================================

// FreeRTOS task health snapshot
message TaskHealth {
    string name = 1;
    uint32 stack_high_water = 2;
    uint32 priority = 3;
    uint32 core = 4;
}

// System health diagnostics
message GetHealthRequest {
    // Empty - returns health diagnostics
}

message GetHealthResponse {
    uint32 free_heap = 1;
    uint32 min_free_heap = 2;
    uint32 uptime_seconds = 3;
    int32 wifi_rssi = 4;
    repeated TaskHealth tasks = 5;
}

// ESP-NOW peer info
message EspNowPeer {
    bytes mac = 1;
    int32 rssi = 2;
    uint32 last_seen_ms = 3;
}

// ESP-NOW subsystem status
message GetEspNowStatusRequest {
    // Empty - returns ESP-NOW status
}

message GetEspNowStatusResponse {
    uint32 peer_count = 1;
    uint32 channel = 2;
    uint32 tx_count = 3;
    uint32 rx_count = 4;
    uint32 tx_fail_count = 5;
    uint32 last_rtt_us = 6;
    string discovery_state = 7;
    repeated EspNowPeer peers = 8;
}

// ESP-NOW latency benchmark
message EspNowBenchRequest {
    uint32 rounds = 1;  // Number of ping-pong rounds (1-1000, default: 100)
}

message EspNowBenchResponse {
    uint32 rounds_completed = 1;
    uint32 rounds_failed = 2;
    uint32 min_rtt_us = 3;
    uint32 max_rtt_us = 4;
    uint32 mean_rtt_us = 5;
    uint32 p50_rtt_us = 6;
    uint32 p95_rtt_us = 7;
    uint32 p99_rtt_us = 8;
}

// ============================================================================
// Crash dump messages
// ============================================================================

// Crash dump stored in NVS after a panic
message GetCrashDumpRequest {
    // Empty - returns last crash dump if present
}

message CrashDumpResponse {
    bool has_dump = 1;           // true if a crash dump exists
    string reason = 2;           // Panic reason string
    string task_name = 3;        // Task that crashed
    uint32 uptime_s = 4;         // Uptime at crash (seconds)
    uint32 free_heap = 5;        // Free heap at crash
    repeated uint32 backtrace = 6; // Program counter values (up to 16)
    uint32 timestamp = 7;        // Boot count when crash occurred
}

message ClearCrashDumpRequest {
    // Empty - clears stored crash dump
}

message ClearCrashDumpResponse {
    bool cleared = 1;            // true if dump was cleared
}

// ============================================================================
// Memory profiler messages
// ============================================================================

// Single heap sample
message HeapSample {
    uint32 timestamp_s = 1;      // Uptime when sample was taken (seconds)
    uint32 free_heap = 2;        // Free heap bytes
    uint32 largest_block = 3;    // Largest free block bytes
    uint32 min_free_heap = 4;    // Historical minimum free heap
}

message GetMemoryProfileRequest {
    // Empty - returns heap samples + current stats
}

message GetMemoryProfileResponse {
    uint32 current_free_heap = 1;
    uint32 current_min_free_heap = 2;
    uint32 current_largest_block = 3;
    uint32 total_heap = 4;
    repeated HeapSample samples = 5;  // Last N heap samples (circular buffer)
}

// ============================================================================
// Self-test / smoke test messages
// ============================================================================

// Individual test result
message SelfTestResult {
    string name = 1;       // Test name (e.g., "LED", "NVS", "Heap")
    bool passed = 2;       // true = PASS, false = FAIL
    string message = 3;    // Detail message (e.g., "256KB free" or error reason)
}

// Self-test request (trigger on-device smoke tests)
message SelfTestRequest {
    // Empty - runs all tests
}

// Self-test response with per-test results
message SelfTestResponse {
    uint32 tests_run = 1;       // Total tests executed
    uint32 tests_passed = 2;    // Number of passes
    repeated SelfTestResult results = 3;  // Per-test results
}

// ============================================================================
// GitHub OTA update messages
// ============================================================================

// Check for firmware updates (triggers GitHub API query)
message CheckUpdateRequest {
    // Empty - checks GitHub releases for newer version
}

message CheckUpdateResponse {
    bool update_available = 1;        // True if newer version found
    string current_version = 2;       // Running firmware version (e.g., "1.2.3")
    string available_version = 3;     // Latest release version (e.g., "1.3.0")
    uint32 firmware_size = 4;         // Size of new firmware in bytes
    bool auto_update_enabled = 5;     // Current auto-update setting
}

// Enable/disable automatic OTA updates on WiFi connect
message SetAutoUpdateRequest {
    bool enabled = 1;
}

message SetAutoUpdateResponse {
    bool enabled = 1;     // New auto-update setting after write
}

// ============================================================================
// Touch injection messages
// ============================================================================

// Inject a simulated touch on a specific pad (host -> device)
message SimulateTouchRequest {
    uint32 pad_index = 1;   // Pad to inject (0-3)
}

message SimulateTouchResponse {
    Status status = 1;
}

// Enable/disable sim drill mode (auto-inject during ESP-NOW drills)
message SetSimModeRequest {
    bool enabled = 1;
    uint32 delay_ms = 2;    // Delay before injection (0 = miss/no injection)
    uint32 pad_index = 3;   // Pad to inject (0-3)
}

message SetSimModeResponse {
    Status status = 1;
    bool enabled = 2;
    uint32 delay_ms = 3;
    uint32 pad_index = 4;
}

// Top-level request envelope
message ConfigRequest {
    oneof request {
        ListFeaturesRequest list_features = 1;
        SetFeatureRequest set_feature = 2;
    }
}

// Top-level response envelope
message ConfigResponse {
    Status status = 1;
    oneof response {
        ListFeaturesResponse list_features = 2;
        SetFeatureResponse set_feature = 3;
    }
}
